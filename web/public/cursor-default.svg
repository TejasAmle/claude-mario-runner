<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" shape-rendering="crispEdges">
  <!--
    Classic pixel arrow. White fill + black outline so it's legible on both
    light and dark backgrounds. Hotspot is the tip at (2,2) — set in CSS.
    Drawn on an integer grid for crisp pixel edges.
  -->
  <path
    d="M 2 2 L 2 17 L 6 13 L 9 19 L 12 18 L 9 12 L 15 12 Z"
    fill="#ffffff"
    stroke="#000000"
    stroke-width="1.5"
    stroke-linejoin="miter"
  />
</svg>
